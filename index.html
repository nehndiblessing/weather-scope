<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WeatherScope — Real-time weather forecasts, air quality, and interactive maps for any city worldwide." />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <meta property="og:title" content="WeatherScope" />
    <meta property="og:description" content="Real-time weather forecasts, air quality, and interactive maps for any city worldwide." />
    <meta property="og:type" content="website" />

    <!-- Preconnect to API origins -->
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://geocoding-api.open-meteo.com" />
    <link rel="preconnect" href="https://air-quality-api.open-meteo.com" />
    <link rel="preconnect" href="https://{s}.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />

    <title>WeatherScope</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Load Recharts UMD from CDN in production to avoid bundling large library -->
    <script>
      if (location.protocol.startsWith('http')) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js';
        s.defer = true;
        document.head.appendChild(s);
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
