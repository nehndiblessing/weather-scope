<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g transform="translate(256,260)">
    <!-- sun -->
    <circle cx="0" cy="-60" r="48" fill="#fbbf24"/>
    <!-- rays -->
    <g stroke="#fbbf24" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-130" x2="0" y2="-148"/>
      <line x1="85" y1="-85" x2="98" y2="-98"/>
      <line x1="110" y1="0" x2="128" y2="0"/>
      <line x1="85" y1="85" x2="98" y2="98"/>
      <line x1="0" y1="110" x2="0" y2="128"/>
      <line x1="-85" y1="85" x2="-98" y2="98"/>
      <line x1="-110" y1="0" x2="-128" y2="0"/>
      <line x1="-85" y1="-85" x2="-98" y2="-98"/>
    </g>
    <!-- cloud -->
    <g fill="white">
      <ellipse cx="-40" cy="20" rx="50" ry="36"/>
      <ellipse cx="20" cy="10" rx="45" ry="40"/>
      <ellipse cx="60" cy="30" rx="35" ry="28"/>
      <rect x="-30" y="20" width="105" height="22" rx="11"/>
    </g>
    <!-- raindrops -->
    <g fill="#93c5fd">
      <path d="M-60,65 Q-60,80 -55,75 Q-50,65 -60,65" transform="rotate(180,-57,70)"/>
      <path d="M-30,75 Q-30,90 -25,85 Q-20,75 -30,75" transform="rotate(180,-27,80)"/>
      <path d="M10,70 Q10,85 15,80 Q20,70 10,70" transform="rotate(180,13,75)"/>
      <path d="M45,60 Q45,75 50,70 Q55,60 45,60" transform="rotate(180,48,65)"/>
    </g>
  </g>
</svg>
